    #splash.hidden { display: none; }

    .splash-top {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      width: 100%; padding: 40px 32px; gap: 20px;
    }
    #splash-logo { width: 200px; max-width: 70vw; height: auto; filter: invert(1); }
    #splash-logo.invisible { visibility: hidden; }

    .splash-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 13px; letter-spacing: .2em;
      text-transform: uppercase; color: #fff;
      text-shadow: 0 1px 8px rgba(0,0,0,0.7), 0 0 20px rgba(0,0,0,0.4);
    }

    .splash-bottom { width: 100%; padding: 36px 24px 0; background: rgba(0,0,0,0.35); backdrop-filter: blur(2px); }
    .splash-bottom label {
      display: block; font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 11px; letter-spacing: .18em;
      text-transform: uppercase; color: rgba(255,255,255,0.45); margin-bottom: 8px;
    }
    .splash-bottom input {
      display: block; width: 100%; background: transparent;
      border: none; border-bottom: 1px solid rgba(255,255,255,0.25);
      outline: none; font-family: 'Inter', sans-serif;
      font-size: 18px; color: #fff; padding: 0 0 10px; -webkit-appearance: none;
    }
    .splash-bottom input::placeholder { color: rgba(255,255,255,0.25); }
    .splash-bottom input:focus { border-bottom-color: rgba(255,255,255,0.7); }
    /* Invisible placeholder to hold space while name flies */
    #splash-name-display { visibility: hidden; font-family: 'Inter', sans-serif; font-size: 18px; color: #fff; padding: 0 0 10px; min-height: 34px; }

    .splash-btn {
      width: 100%; height: 52px; margin-top: 28px;
      background: #e6e5e2; color: #0d0d0d; border: none;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800; font-size: 16px; letter-spacing: .18em;
      text-transform: uppercase; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .splash-btn:active { opacity: .85; }

    /* ── Flying elements (fixed overlays during transition) ── */
    .flying {
      position: fixed; z-index: 200; pointer-events: none; display: none;
    }
    #flying-logo {
      filter: invert(1);
      transition: top 0.55s cubic-bezier(0.4,0,0.2,1),
                  left 0.55s cubic-bezier(0.4,0,0.2,1),
                  width 0.55s cubic-bezier(0.4,0,0.2,1);
    }
    #flying-name {
      font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
      letter-spacing: .06em; text-transform: uppercase; white-space: nowrap;
      transition: top 0.55s cubic-bezier(0.4,0,0.2,1),
                  left 0.55s cubic-bezier(0.4,0,0.2,1),
                  font-size 0.55s cubic-bezier(0.4,0,0.2,1),
                  color 0.55s ease;
    }

    /* ── Main app ── */
    #app { display: block; }
    #app.hidden { display: none; }
    #app.invisible { visibility: hidden; }

    .topbar {
      background: #0d0d0d; padding: 0 18px; height: 58px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    #topbar-logo { height: 36px; width: auto; filter: invert(1); }
    #topbar-logo.invisible { visibility: hidden; }

    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .topbar-event { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: .12em; text-transform: uppercase; color: rgba(255,255,255,.5); }
    #topbar-member {
      font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px;
      letter-spacing: .06em; text-transform: uppercase; color: rgba(255,255,255,0.85);
      cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.3);
    }
    #topbar-member.invisible { visibility: hidden; }

    .hero { padding: 28px 18px 22px; text-align: center; }
    .hero-headline { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 38px; line-height: .95; letter-spacing: .01em; text-transform: uppercase; color: #0d0d0d; }
    .hero-sub { font-size: 13px; color: #666; margin-top: 10px; }

    .form-wrap { margin: 0 14px; background: #fff; border: 1px solid #0d0d0d; }
    .form-section-hd { border-bottom: 1px solid #0d0d0d; padding: 10px 14px; }
    .form-section-hd span { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: #999; }

    .field-row { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid #0d0d0d; }
    .field-row:last-child { border-bottom: none; }
    .field { padding: 12px 14px 10px; border-bottom: 1px solid #0d0d0d; }
    .field:last-child { border-bottom: none; }
    .field-row .field { border-bottom: none; }
    .field-row .field:first-child { border-right: 1px solid #0d0d0d; }

    .field label { display: block; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: #999; margin-bottom: 4px; }
    .field input { display: block; width: 100%; border: none; outline: none; background: transparent; font-family: 'Inter', sans-serif; font-size: 15px; color: #0d0d0d; padding: 0; height: 28px; -webkit-appearance: none; }
    .field input::placeholder { color: #ccc; }
    .field input:focus { border-bottom: 1.5px solid #0d0d0d; margin-bottom: -1.5px; }

    .submit-wrap { margin: 14px 14px 0; }
    .submit-btn { width: 100%; height: 52px; background: #0d0d0d; color: #e6e5e2; border: none; font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 16px; letter-spacing: .18em; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; -webkit-tap-highlight-color: transparent; }
    .submit-btn:active { opacity: .85; }
    .submit-btn:disabled { opacity: .45; cursor: not-allowed; }

    .status { margin: 10px 14px 0; padding: 11px 14px; font-size: 13px; display: none; align-items: center; gap: 8px; border: 1px solid; }
    .status.success { display: flex; background: #f0f5f0; color: #2a5c2a; border-color: #2a5c2a; }
    .status.error { display: flex; background: #faf0f0; color: #a32d2d; border-color: #a32d2d; }

    .leads-section { margin: 24px 14px 0; padding-bottom: 40px; }
    .leads-hd { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px; }
    .leads-label { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: #888; }
    .leads-count-badge { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 11px; color: #888; background: #d8d7d4; padding: 2px 8px; }

    .lead-row { background: #fff; border: 1px solid #0d0d0d; padding: 11px 14px; margin-bottom: 6px; display: flex; align-items: center; gap: 12px; }
    .lead-initials { width: 32px; height: 32px; background: #0d0d0d; color: #e6e5e2; display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 12px; flex-shrink: 0; }
    .lead-name { font-size: 14px; font-weight: 500; color: #0d0d0d; }
    .lead-meta { font-size: 12px; color: #888; margin-top: 1px; }

    .sheet-link { display: flex; align-items: center; justify-content: center; gap: 7px; margin: 16px 14px 0; padding: 12px; border: 1px solid #0d0d0d; background: transparent; text-decoration: none; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 12px; letter-spacing: .14em; text-transform: uppercase; color: #0d0d0d; }

    .spinner { width: 16px; height: 16px; border: 2px solid rgba(230,229,226,.3); border-top-color: #e6e5e2; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    <div class="hero">
      <div class="hero-headline">Lead<br>Capture</div>
      <div class="hero-sub">All fields optional — save what you have.</div>
    </div>

    <div class="form-wrap">
      <div class="form-section-hd"><span>Contact details</span></div>
      <div class="field-row">
        <div class="field"><label>Name</label><input type="text" id="f-name" placeholder="Full name" autocomplete="name" /></div>
        <div class="field"><label>Company</label><input type="text" id="f-company" placeholder="Org" autocomplete="organization" /></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Location</label><input type="text" id="f-location" placeholder="City" /></div>
        <div class="field"><label>Email</label><input type="email" id="f-email" placeholder="name@co.com" autocomplete="email" /></div>
      </div>
      <div class="field-row">
        <div class="field"><label>LinkedIn</label><input type="url" id="f-linkedin" placeholder="linkedin.com/in/…" /></div>
        <div class="field"><label>Phone</label><input type="tel" id="f-phone" placeholder="+1 234…" autocomplete="tel" /></div>
      </div>
      <div class="field">
        <label>Notes</label>
        <textarea id="f-notes" placeholder="Context, next steps…" rows="3" style="display:block;width:100%;border:none;outline:none;background:transparent;font-family:'Inter',sans-serif;font-size:15px;color:#0d0d0d;padding:0;resize:none;line-height:1.5;"></textarea>
      </div>
    </div>

    <div class="submit-wrap">
      <button class="submit-btn" id="submit-btn" onclick="submitLead()">
        <span id="btn-label">Save</span>
        <div id="btn-spinner" class="spinner" style="display:none;"></div>
      </button>
    </div>

    <div class="status" id="status-msg"></div>

    <div class="leads-section">
      <div class="leads-hd">
        <span class="leads-label">Session leads</span>
        <span class="leads-count-badge" id="leads-count">0</span>
      </div>
      <div id="leads-list"></div>
      <a href="https://docs.google.com/spreadsheets/d/13jqDhpFoEKmRKknB8ZWFH27OfcRN60ae6-1VNlvu5nA/edit?gid=0#gid=0" target="_blank" class="sheet-link">
        ↗ View Google Sheet
      </a>
    </div>
  </div>

  <script>
    const WEBHOOK = 'https://script.google.com/macros/s/AKfycbyltLsgsZTVbzK8I6uNuSVQf0AuLioTMMlMBzC2vHv5Y4cJ87wSGLPzni5wpaiLXlswEg/exec';
    const sessionLeads = [];
    let teamMember = '';

    function flyElement(el, fromRect, toRect, extraStyles, delay) {
      // Snap to start with no transition
      el.style.transition = 'none';
      el.style.display = 'block';
      Object.assign(el.style, extraStyles.from);
      el.style.top = fromRect.top + 'px';
      el.style.left = fromRect.left + 'px';

      requestAnimationFrame(() => requestAnimationFrame(() => {
        el.style.transition = [
          'top 0.55s cubic-bezier(0.4,0,0.2,1)',
          'left 0.55s cubic-bezier(0.4,0,0.2,1)',
          ...(extraStyles.transitions || [])
        ].join(', ');
        Object.assign(el.style, extraStyles.to);
        el.style.top = toRect.top + 'px';
        el.style.left = toRect.left + 'px';
      }));
    }

    function startApp() {
      const val = document.getElementById('s-member').value.trim();
      if (!val) { document.getElementById('s-member').focus(); return; }
      teamMember = val;
      localStorage.setItem('caliber_member', val);
      document.getElementById('topbar-member').textContent = val;
      animateToApp();
    }

    function animateToApp() {
      const splashLogo   = document.getElementById('splash-logo');
      const topbarLogo   = document.getElementById('topbar-logo');
      const flyingLogo   = document.getElementById('flying-logo');
      const splashInput  = document.getElementById('s-member');
      const topbarMember = document.getElementById('topbar-member');
      const flyingName   = document.getElementById('flying-name');
      const splash       = document.getElementById('splash');
      const app          = document.getElementById('app');

      // Measure start positions
      const logoFrom = splashLogo.getBoundingClientRect();
      const nameFrom = splashInput.getBoundingClientRect();

      // Render app invisibly to measure target positions
      app.classList.remove('hidden');
      app.classList.add('invisible');

      requestAnimationFrame(() => {
        const logoTo = topbarLogo.getBoundingClientRect();
        const nameTo = topbarMember.getBoundingClientRect();

        // Hide real elements
        splashLogo.classList.add('invisible');
        topbarLogo.classList.add('invisible');
        splashInput.style.visibility = 'hidden';
        topbarMember.classList.add('invisible');

        // Set flying name content
        flyingName.textContent = teamMember;

        // Fly logo
        flyElement(flyingLogo,
          { top: logoFrom.top, left: logoFrom.left },
          { top: logoTo.top,   left: logoTo.left },
          {
            from: { width: logoFrom.width + 'px', filter: 'invert(1)' },
            to:   { width: logoTo.height + 'px',  filter: 'invert(1)' },
            transitions: ['width 0.55s cubic-bezier(0.4,0,0.2,1)']
          }
        );

        // Fly name: splash input style → topbar member style
        flyElement(flyingName,
          { top: nameFrom.top, left: nameFrom.left },
          { top: nameTo.top,   left: nameTo.left },
          {
            from: { fontSize: '18px', color: '#ffffff', letterSpacing: '0' },
            to:   { fontSize: '13px', color: 'rgba(255,255,255,0.85)', letterSpacing: '0.06em' },
            transitions: ['font-size 0.55s cubic-bezier(0.4,0,0.2,1)', 'color 0.55s ease', 'letter-spacing 0.55s ease']
          }
        );

        // Fade splash out
        splash.style.transition = 'opacity 0.4s ease';
        splash.style.opacity = '0';

        // Reveal app behind
        app.classList.remove('invisible');

        // Clean up
        setTimeout(() => {
          flyingLogo.style.display = 'none';
          flyingName.style.display = 'none';
          topbarLogo.classList.remove('invisible');
          topbarMember.classList.remove('invisible');
          splashInput.style.visibility = '';
          splash.style.opacity = '';
          splash.style.transition = '';
          splash.classList.add('hidden');
        }, 650);
      });
    }

    function resetMember() {
      localStorage.removeItem('caliber_member');
      document.getElementById('s-member').value = teamMember;
      document.getElementById('splash-btn').textContent = 'Update name';
      animateToSplash();
    }

    function animateToSplash() {
      const splashLogo   = document.getElementById('splash-logo');
      const topbarLogo   = document.getElementById('topbar-logo');
      const flyingLogo   = document.getElementById('flying-logo');
      const splashInput  = document.getElementById('s-member');
      const topbarMember = document.getElementById('topbar-member');
      const flyingName   = document.getElementById('flying-name');
      const splash       = document.getElementById('splash');
      const app          = document.getElementById('app');

      // Measure start positions (topbar)
      const logoFrom = topbarLogo.getBoundingClientRect();
      const nameFrom = topbarMember.getBoundingClientRect();

      // Show splash invisibly to measure target positions
      splash.classList.remove('hidden');
      splash.style.opacity = '0';
      splashLogo.classList.remove('invisible');

      requestAnimationFrame(() => {
        const logoTo = splashLogo.getBoundingClientRect();
        const nameTo = splashInput.getBoundingClientRect();

        // Hide real elements
        topbarLogo.classList.add('invisible');
        topbarMember.classList.add('invisible');
        splashLogo.classList.add('invisible');
        splashInput.style.visibility = 'hidden';

        // Set flying name content
        flyingName.textContent = teamMember;

        // Fly logo (topbar → splash centre)
        flyElement(flyingLogo,
          { top: logoFrom.top, left: logoFrom.left },
          { top: logoTo.top,   left: logoTo.left },
          {
            from: { width: logoFrom.height + 'px', filter: 'invert(1)' },
            to:   { width: logoTo.width + 'px',    filter: 'invert(1)' },
            transitions: ['width 0.55s cubic-bezier(0.4,0,0.2,1)']
          }
        );

        // Fly name: topbar style → splash input style
        flyElement(flyingName,
          { top: nameFrom.top, left: nameFrom.left },
          { top: nameTo.top,   left: nameTo.left },
          {
            from: { fontSize: '13px', color: 'rgba(255,255,255,0.85)', letterSpacing: '0.06em' },
            to:   { fontSize: '18px', color: '#ffffff',                letterSpacing: '0' },
            transitions: ['font-size 0.55s cubic-bezier(0.4,0,0.2,1)', 'color 0.55s ease', 'letter-spacing 0.55s ease']
          }
        );

        // Fade splash in
        requestAnimationFrame(() => requestAnimationFrame(() => {
          splash.style.transition = 'opacity 0.4s ease';
          splash.style.opacity = '1';
        }));

        // Clean up
        setTimeout(() => {
          flyingLogo.style.display = 'none';
          flyingName.style.display = 'none';
          topbarLogo.classList.remove('invisible');
          topbarMember.classList.remove('invisible');
          splashLogo.classList.remove('invisible');
          splashInput.style.visibility = '';
          splash.style.transition = '';
          splash.style.opacity = '';
          app.classList.add('hidden');
          setTimeout(() => {
            splashInput.focus();
            splashInput.select();
          }, 50);
        }, 650);
      });
    }

    window.addEventListener('DOMContentLoaded', () => {
      const saved = localStorage.getItem('caliber_member');
      if (saved) {
        teamMember = saved;
        document.getElementById('topbar-member').textContent = saved;
        document.getElementById('splash').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
      }
      document.getElementById('s-member').addEventListener('keydown', e => {
        if (e.key === 'Enter') startApp();
      });
    });

    async function submitLead() {
      const fields = {
        name:     document.getElementById('f-name').value.trim(),
        company:  document.getElementById('f-company').value.trim(),
        location: document.getElementById('f-location').value.trim(),
        owner:    teamMember,
        linkedin: document.getElementById('f-linkedin').value.trim(),
        email:    document.getElementById('f-email').value.trim(),
        phone:    document.getElementById('f-phone').value.trim(),
        notes:    document.getElementById('f-notes').value.trim(),
      };

      if (!Object.values(fields).some(v => v)) {
        showStatus('error', 'Fill in at least one field before saving.');
        return;
      }

      setLoading(true);
      clearStatus();

      try {
        const ts = new Date().toLocaleString('en-GB', {
          timeZone: 'Europe/Paris',
          day: '2-digit', month: 'short', year: 'numeric',
          hour: '2-digit', minute: '2-digit'
        });

        const res = await fetch(WEBHOOK, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ timestamp: ts, ...fields })
        });

        const data = await res.json();
        if (!data.ok) throw new Error(data.error || 'Script returned error');

        sessionLeads.unshift({ ...fields, ts });
        renderLeads();
        clearForm();
        showSuccessOverlay();

      } catch (err) {
        showStatus('error', 'Could not save. Check your internet connection and try again.');
        console.error(err);
      } finally {
        setLoading(false);
      }
    }

    function setLoading(on) {
      document.getElementById('submit-btn').disabled = on;
      document.getElementById('btn-label').textContent = on ? 'Saving…' : 'Save';
      document.getElementById('btn-spinner').style.display = on ? 'block' : 'none';
    }

    function showSuccessOverlay() {
      const overlay = document.getElementById('success-overlay');
      const tick    = document.getElementById('success-tick');
      const text    = document.getElementById('success-text');

      // Reset state
      tick.classList.remove('pop');
      text.classList.remove('show');
      overlay.classList.remove('visible');
      overlay.classList.add('show');

      // Fade in overlay
      requestAnimationFrame(() => requestAnimationFrame(() => {
        overlay.classList.add('visible');

        // Pop tick after fade in
        setTimeout(() => tick.classList.add('pop'), 150);

        // Show text after 1 second
        setTimeout(() => text.classList.add('show'), 1000);

        // Dismiss after 2.2 seconds
        setTimeout(() => {
          overlay.classList.remove('visible');
          setTimeout(() => {
            overlay.classList.remove('show');
            tick.classList.remove('pop');
            text.classList.remove('show');
          }, 300);
        }, 2200);
      }));
    }

    function showStatus(type, msg) {
      const el = document.getElementById('status-msg');
      el.className = 'status ' + type;
      el.innerHTML = (type === 'success' ? '✓ ' : '⚠ ') + msg;
    }

    function clearStatus() { document.getElementById('status-msg').className = 'status'; }

    function clearForm() {
      ['f-name','f-company','f-location','f-linkedin','f-email','f-phone','f-notes'].forEach(id => {
        document.getElementById(id).value = '';
      });
    }

    function initials(name) {
      return name.trim().split(/\s+/).slice(0,2).map(w => w[0].toUpperCase()).join('') || '?';
    }

    function renderLeads() {
      document.getElementById('leads-count').textContent = sessionLeads.length;
      document.getElementById('leads-list').innerHTML = sessionLeads.map(l => `
        <div class="lead-row">
          <div class="lead-initials">${l.name ? initials(l.name) : '?'}</div>
          <div>
            <div class="lead-name">${l.name || '(unnamed)'}</div>
            <div class="lead-meta">${[l.company, l.location].filter(Boolean).join(' · ') || l.email || '—'}</div>
          </div>
        </div>
      `).join('');
    }
  </script>

</body>
</html>
